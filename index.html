<!DOCTYPE html>
<html lang="ar" dir="rtl">

<meta charset="UTF-8">

<title>ورتّل ريلز</title>

<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Cairo',sans-serif;
}

body{
background:linear-gradient(-45deg,#020617,#0f172a,#111827,#1e1b4b);
background-size:400% 400%;
animation:bgMove 14s ease infinite;
color:white;
overflow-x:hidden;
min-height:100vh;
}

@keyframes bgMove{
0%{background-position:0% 50%;}
50%{background-position:100% 50%;}
100%{background-position:0% 50%;}
}

nav{
display:flex;
justify-content:space-between;
align-items:center;
padding:25px 40px;
background:rgba(0,0,0,.25);
backdrop-filter:blur(15px);
position:sticky;
top:0;
z-index:999;
}

.logo{
font-size:32px;
font-weight:900;
background:linear-gradient(45deg,#38bdf8,#8b5cf6);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
}

.hero{
text-align:center;
padding:70px 20px;
}

.hero h1{
font-size:70px;
line-height:1.5;
}

.hero span{
color:#38bdf8;
}

.hero p{
font-size:24px;
margin-top:15px;
color:#cbd5e1;
}

.container{
display:flex;
justify-content:center;
gap:50px;
padding:40px;
flex-wrap:wrap;
}

.settings{
width:430px;
background:rgba(255,255,255,.05);
padding:30px;
border-radius:30px;
backdrop-filter:blur(18px);
border:1px solid rgba(255,255,255,.08);
}

.settings h2{
font-size:35px;
margin-bottom:20px;
}

label{
display:block;
margin-top:18px;
margin-bottom:10px;
font-size:18px;
}

select,
input{
width:100%;
padding:16px;
border:none;
border-radius:16px;
background:#0f172a;
color:white;
font-size:17px;
outline:none;
}

.btn{
width:100%;
padding:18px;
margin-top:25px;
border:none;
border-radius:18px;
background:linear-gradient(45deg,#38bdf8,#8b5cf6);
color:white;
font-size:22px;
font-weight:bold;
cursor:pointer;
transition:.4s;
}

.btn:hover{
transform:scale(1.03);
}

.preview{
width:340px;
height:620px;
border-radius:35px;
overflow:hidden;
position:relative;
background:url('https://images.unsplash.com/photo-1506744038136-46273834b3fb?q=80&w=1200&auto=format&fit=crop');
background-size:cover;
background-position:center;
box-shadow:0 0 40px rgba(56,189,248,.35);
transition:1s;
}

.overlay{
position:absolute;
inset:0;
background:linear-gradient(to top,
rgba(0,0,0,.9),
rgba(0,0,0,.2));
display:flex;
flex-direction:column;
justify-content:end;
align-items:center;
padding:35px;
text-align:center;
}

.surah{
background:rgba(0,0,0,.5);
padding:12px 25px;
border-radius:25px;
font-size:28px;
margin-bottom:20px;
}

.reader{
background:rgba(139,92,246,.4);
padding:10px 20px;
border-radius:20px;
font-size:18px;
margin-bottom:20px;
}

.ayah{
font-size:28px;
line-height:2;
font-weight:bold;
text-shadow:0 0 15px black;
}

footer{
text-align:center;
padding:40px;
margin-top:50px;
}

.designer{
font-size:28px;
font-weight:900;
background:linear-gradient(45deg,#38bdf8,#8b5cf6);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
letter-spacing:4px;
}

</style>

</head>

<script>

function updateSurah(value){
document.getElementById("surahText").innerHTML =
"سورة " + value;

function updateReader(value){

"القارئ: " + value;
}

function changeBg(value){
document.getElementById("preview").style.backgroundImage =
"url('" + value + "')";
}
