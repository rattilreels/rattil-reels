<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>قرآن ريلز</title>

<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Cairo',sans-serif;
}

body{
background:#050816;
color:white;
overflow-x:hidden;
}

header{
position:fixed;
top:0;
width:100%;
z-index:999;
padding:18px;
background:rgba(0,0,0,.55);
backdrop-filter:blur(10px);
display:flex;
justify-content:space-between;
align-items:center;
border-bottom:1px solid rgba(255,255,255,.07);
}

.logo{
font-size:30px;
font-weight:900;
color:#f6c84c;
}

.container{
padding:120px 20px 30px;
display:grid;
grid-template-columns:420px 1fr;
gap:25px;
}

.phone{
width:100%;
height:760px;
background:black;
border-radius:35px;
overflow:hidden;
position:sticky;
top:110px;
box-shadow:0 0 35px rgba(0,0,0,.7);
}

.phone video,
.phone img{
position:absolute;
width:100%;
height:100%;
object-fit:cover;
}

.overlay{
position:absolute;
inset:0;
background:linear-gradient(to top,rgba(0,0,0,.8),transparent);
z-index:2;
}

.content{
position:absolute;
bottom:120px;
width:100%;
padding:20px;
z-index:5;
text-align:center;
}

.surah{
display:inline-block;
padding:10px 20px;
border-radius:999px;
background:rgba(0,0,0,.5);
margin-bottom:15px;
font-weight:bold;
}

.ayah{
font-size:33px;
font-weight:900;
line-height:1.9;
text-shadow:0 0 15px black;
}

.reader{
margin-top:15px;
font-size:20px;
color:#f6c84c;
}

.controls{
position:absolute;
bottom:20px;
left:50%;
transform:translateX(-50%);
display:flex;
gap:10px;
z-index:10;
}

.controls button{
padding:13px 20px;
border:none;
border-radius:15px;
font-weight:bold;
cursor:pointer;
background:#f6c84c;
}

.panel{
background:#0e1223;
border-radius:25px;
padding:25px;
border:1px solid rgba(255,255,255,.08);
}

.section{
margin-bottom:30px;
}

.section h2{
margin-bottom:15px;
font-size:24px;
}

select,
input{
width:100%;
padding:16px;
background:#14192b;
border:none;
border-radius:15px;
color:white;
font-size:18px;
margin-bottom:15px;
}

.range{
display:flex;
gap:15px;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(120px,1fr));
gap:15px;
}

.bg{
height:220px;
overflow:hidden;
border-radius:20px;
cursor:pointer;
border:3px solid transparent;
}

.bg img,
.bg video{
width:100%;
height:100%;
object-fit:cover;
}

.bg:hover{
border-color:#f6c84c;
}

.create{
width:100%;
padding:20px;
border:none;
border-radius:20px;
background:#f6c84c;
font-size:26px;
font-weight:900;
cursor:pointer;
}

.download{
margin-top:20px;
width:100%;
padding:18px;
border:none;
border-radius:20px;
background:#fff;
font-size:22px;
font-weight:900;
cursor:pointer;
}

@media(max-width:900px){

.container{
grid-template-columns:1fr;
}

.phone{
position:relative;
top:0;
height:700px;
}

}

</style>
</head>

<script>

const audio=document.getElementById("audio");

function playAudio(){

audio.play();

}

function pauseAudio(){

audio.pause();

}

function changeSurah(){

const surah=document.getElementById("surahSelect").value;

document.getElementById("surahName").innerText=
"سورة "+surah;

}

function changeReader(){

const reader=document.getElementById("readerSelect").value;

document.getElementById("readerName").innerText=
"القارئ : "+reader;

}

function setImage(src){

document.getElementById("imageBg").style.display="block";

document.getElementById("videoBg").style.display="none";

document.getElementById("imageBg").src=src;

}

function setVideo(src){

const video=document.getElementById("videoBg");

video.style.display="block";

document.getElementById("imageBg").style.display="none";

video.src=src;

video.play();

}

function createReel(){

const from=document.getElementById("fromAyah").value;

const to=document.getElementById("toAyah").value;

if(from && to){

document.getElementById("ayahText").innerHTML=
"الآيات من "+from+" إلى "+to;

}

alert("تم إنشاء الريلز بنجاح 🔥");

}

</script>
