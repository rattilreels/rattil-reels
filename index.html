<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>QuickQR | تحويل الروابط إلى QR Code</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;800&display=swap" rel="stylesheet">

  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Cairo', sans-serif;
    }

    body {
      min-height: 100vh;
      background: linear-gradient(135deg, #0f172a, #111827, #1e293b);
      display: flex;
      justify-content: center;
      align-items: center;
      overflow-x: hidden;
      padding: 20px;
      color: white;
    }

    .bg {
      position: fixed;
      width: 100%;
      height: 100%;
      top: 0;
      left: 0;
      z-index: -1;
      overflow: hidden;
    }

    .circle {
      position: absolute;
      border-radius: 50%;
      background: rgba(255,255,255,0.05);
      animation: float 12s infinite linear;
    }

    .circle:nth-child(1) {
      width: 250px;
      height: 250px;
      top: 10%;
      left: 10%;
    }

    .circle:nth-child(2) {
      width: 180px;
      height: 180px;
      bottom: 15%;
      right: 15%;
      animation-duration: 15s;
    }

    .circle:nth-child(3) {
      width: 120px;
      height: 120px;
      top: 60%;
      left: 50%;
      animation-duration: 18s;
    }

    @keyframes float {
      0% {
        transform: translateY(0px) rotate(0deg);
      }
      50% {
        transform: translateY(-20px) rotate(180deg);
      }
      100% {
        transform: translateY(0px) rotate(360deg);
      }
    }

    .container {
      width: 100%;
      max-width: 500px;
      background: rgba(255,255,255,0.08);
      backdrop-filter: blur(20px);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 30px;
      padding: 35px;
      text-align: center;
      box-shadow: 0 10px 40px rgba(0,0,0,0.4);
    }

    .logo {
      width: 85px;
      height: 85px;
      margin: auto;
      border-radius: 25px;
      background: linear-gradient(135deg, #3b82f6, #8b5cf6);
      display: flex;
      justify-content: center;
      align-items: center;
      font-size: 35px;
      margin-bottom: 20px;
      box-shadow: 0 10px 30px rgba(59,130,246,0.4);
    }

    h1 {
      font-size: 34px;
      margin-bottom: 10px;
      font-weight: 800;
    }

    .desc {
      color: #cbd5e1;
      margin-bottom: 30px;
      line-height: 1.8;
      font-size: 15px;
    }

    .input-box {
      margin-bottom: 20px;
    }

    input {
      width: 100%;
      padding: 18px;
      border: none;
      outline: none;
      border-radius: 18px;
      background: rgba(255,255,255,0.1);
      color: white;
      font-size: 16px;
      transition: 0.3s;
      border: 1px solid transparent;
    }

    input:focus {
      border-color: #3b82f6;
      box-shadow: 0 0 20px rgba(59,130,246,0.3);
    }

    input::placeholder {
      color: #94a3b8;
    }

    button {
      width: 100%;
      padding: 18px;
      border: none;
      border-radius: 18px;
      background: linear-gradient(135deg, #3b82f6, #8b5cf6);
      color: white;
      font-size: 18px;
      font-weight: bold;
      cursor: pointer;
      transition: 0.3s;
      margin-bottom: 25px;
    }

    button:hover {
      transform: translateY(-3px);
      box-shadow: 0 10px 25px rgba(59,130,246,0.4);
    }

    #qrcode {
      display: flex;
      justify-content: center;
      margin-top: 15px;
      margin-bottom: 20px;
    }

    #qrcode img {
      background: white;
      padding: 12px;
      border-radius: 20px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.3);
    }

    .download-btn {
      display: none;
      text-decoration: none;
      background: #10b981;
      color: white;
      padding: 14px 25px;
      border-radius: 15px;
      font-weight: bold;
      transition: 0.3s;
    }

    .download-btn:hover {
      background: #059669;
    }

    .footer {
      margin-top: 25px;
      color: #94a3b8;
      font-size: 14px;
    }

    @media(max-width:600px) {
      .container {
        padding: 25px;
      }

      h1 {
        font-size: 28px;
      }
    }
  </style>
</head>
<body>

  <div class="bg">
    <div class="circle"></div>
    <div class="circle"></div>
    <div class="circle"></div>
  </div>

  <div class="container">

    <div class="logo">🔳</div>

    <h1>QuickQR</h1>

    <p class="desc">
      حوّل أي رابط إلى QR Code بشكل سريع واحترافي
      وقم بتحميله بضغطة واحدة.
    </p>

    <div class="input-box">
      <input type="text" id="url" placeholder="ضع الرابط هنا...">
    </div>

    <button onclick="generateQR()">
      إنشاء QR Code
    </button>

    <div id="qrcode"></div>

    <a id="downloadBtn" class="download-btn" download="quickqr.png">
      تحميل QR Code
    </a>

    <div class="footer">
      جميع الحقوق محفوظة © QuickQR
    </div>

  </div>

  <script>
    function generateQR() {
      const url = document.getElementById("url").value;
      const qrContainer = document.getElementById("qrcode");
      const downloadBtn = document.getElementById("downloadBtn");

      qrContainer.innerHTML = "";

      if(url.trim() === "") {
        alert("من فضلك ضع رابط أولاً");
        return;
      }

      new QRCode(qrContainer, {
        text: url,
        width: 250,
        height: 250,
        colorDark: "#000000",
        colorLight: "#ffffff",
        correctLevel: QRCode.CorrectLevel.H
      });

      setTimeout(() => {
        const qrImg = qrContainer.querySelector("img");

        if(qrImg) {
          downloadBtn.href = qrImg.src;
          downloadBtn.style.display = "inline-block";
        }
      }, 300);
    }
  </script>

</body>
</html>
