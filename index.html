<!DOCTYPE html>
<html lang="ar" dir="rtl">

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>ورتّل ريلز</title>

<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Cairo',sans-serif;
}

body{
background:linear-gradient(-45deg,#020617,#0f172a,#111827,#1e1b4b);
background-size:400% 400%;
animation:bgMove 15s ease infinite;
color:white;
min-height:100vh;
overflow-x:hidden;
}

@keyframes bgMove{
0%{background-position:0% 50%;}
50%{background-position:100% 50%;}
100%{background-position:0% 50%;}
}

nav{
display:flex;
justify-content:space-between;
align-items:center;
padding:25px 40px;
background:rgba(0,0,0,.25);
backdrop-filter:blur(15px);
position:sticky;
top:0;
z-index:999;
}

.logo{
font-size:32px;
font-weight:900;
background:linear-gradient(45deg,#38bdf8,#8b5cf6);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
}

.hero{
text-align:center;
padding:70px 20px;
}

.hero h1{
font-size:65px;
line-height:1.5;
}

.hero span{
color:#38bdf8;
}

.hero p{
font-size:22px;
margin-top:10px;
color:#cbd5e1;
}

.container{
display:flex;
justify-content:center;
gap:50px;
padding:40px;
flex-wrap:wrap;
}

.settings{
width:430px;
background:rgba(255,255,255,.05);
padding:30px;
border-radius:30px;
backdrop-filter:blur(18px);
border:1px solid rgba(255,255,255,.08);
}

.settings h2{
font-size:35px;
margin-bottom:20px;
}

label{
display:block;
margin-top:18px;
margin-bottom:10px;
font-size:18px;
}

select,input{
width:100%;
padding:16px;
border:none;
border-radius:16px;
background:#0f172a;
color:white;
font-size:17px;
outline:none;
}

.btn{
width:100%;
padding:18px;
margin-top:25px;
border:none;
border-radius:18px;
background:linear-gradient(45deg,#38bdf8,#8b5cf6);
color:white;
font-size:22px;
font-weight:bold;
cursor:pointer;
transition:.4s;
}

.btn:hover{
transform:scale(1.03);
}

.preview{
width:340px;
height:620px;
border-radius:35px;
overflow:hidden;
position:relative;
background-size:cover;
background-position:center;
box-shadow:0 0 40px rgba(56,189,248,.35);
transition:1s;
}

.overlay{
position:absolute;
inset:0;
background:linear-gradient(to top,
rgba(0,0,0,.92),
rgba(0,0,0,.2));
display:flex;
flex-direction:column;
justify-content:end;
align-items:center;
padding:35px;
text-align:center;
}

.surah{
background:rgba(0,0,0,.5);
padding:12px 25px;
border-radius:25px;
font-size:28px;
margin-bottom:20px;
}

.reader{
background:rgba(139,92,246,.4);
padding:10px 20px;
border-radius:20px;
font-size:18px;
margin-bottom:20px;
}

.ayah{
font-size:28px;
line-height:2;
font-weight:bold;
text-shadow:0 0 15px black;
}

footer{
text-align:center;
padding:40px;
}

.designer{
font-size:28px;
font-weight:900;
background:linear-gradient(45deg,#38bdf8,#8b5cf6);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
letter-spacing:4px;
}

</style>
</head>

<script>

const backgrounds = [

'https://images.unsplash.com/photo-1506744038136-46273834b3fb?q=80&w=1200',
'https://images.unsplash.com/photo-1507525428034-b723cf961d3e?q=80&w=1200',
'https://images.unsplash.com/photo-1441974231531-c6227db76b6e?q=80&w=1200',
'https://images.unsplash.com/photo-1469474968028-56623f02e42e?q=80&w=1200'

];

async function createReel(){

const surahIndex =
document.getElementById("surahSelect").selectedIndex + 1;

const surahName =
document.getElementById("surahSelect").value;

const fromAyah =
document.getElementById("fromAyah").value || 1;

const toAyah =
document.getElementById("toAyah").value || 1;

const reader =
document.getElementById("readerSelect").value;

document.getElementById("surahText").innerHTML =
"سورة " + surahName;

document.getElementById("readerText").innerHTML =
"القارئ: " + reader;

let result = "";

for(let i=fromAyah;i<=toAyah;i++){

try{

const response =
await fetch(`https://api.alquran.cloud/v1/ayah/${surahIndex}:${i}/ar.alafasy`);

const data =
await response.json();

result += data.data.text + "<br>";

}catch(e){}

}

document.getElementById("ayahText").innerHTML =
result;

const randomBg =
backgrounds[
Math.floor(Math.random()*backgrounds.length)
];

document.getElementById("preview").style.backgroundImage =
"url('" + randomBg + "')";

}

createReel();

</script>
