<title>ورتّل ريلز | HAITHAM STUDIO</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Cairo',sans-serif;
}

body{
background:#020617;
color:white;
overflow-x:hidden;
}

body::before{
content:'';
position:fixed;
inset:0;
background:
radial-gradient(circle at top,#2563eb33,transparent 40%),
radial-gradient(circle at bottom,#7c3aed33,transparent 40%);
z-index:-1;
}

nav{
display:flex;
justify-content:space-between;
align-items:center;
padding:20px 40px;
background:#020617;
border-bottom:1px solid rgba(255,255,255,.08);
}

.logo{
font-size:40px;
font-weight:900;
background:linear-gradient(45deg,#38bdf8,#8b5cf6);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
}

.hero{
text-align:center;
padding:40px 20px;
}

.hero h1{
font-size:60px;
margin-bottom:15px;
}

.hero span{
color:#38bdf8;
}

.hero p{
font-size:22px;
color:#cbd5e1;
}

.container{
display:flex;
justify-content:center;
gap:40px;
padding:20px;
flex-wrap:wrap;
}

.panel{
width:470px;
background:rgba(255,255,255,.04);
border:1px solid rgba(255,255,255,.08);
padding:30px;
border-radius:30px;
backdrop-filter:blur(15px);
}

.panel h2{
font-size:32px;
margin-bottom:20px;
color:#38bdf8;
}

label{
display:block;
margin-top:20px;
margin-bottom:8px;
font-size:18px;
}

select,
input{
width:100%;
padding:16px;
background:#0f172a;
border:none;
border-radius:16px;
color:white;
font-size:17px;
outline:none;
}

.image-grid{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:10px;
margin-top:15px;
}

.image-grid img{
width:100%;
height:110px;
object-fit:cover;
border-radius:15px;
cursor:pointer;
border:3px solid transparent;
transition:.3s;
}

.image-grid img:hover{
transform:scale(1.03);
}

.image-grid img.active{
border-color:#38bdf8;
}

.btn{
width:100%;
padding:18px;
margin-top:25px;
border:none;
border-radius:18px;
font-size:22px;
font-weight:bold;
cursor:pointer;
background:linear-gradient(45deg,#38bdf8,#8b5cf6);
color:white;
transition:.3s;
}

.btn:hover{
transform:scale(1.02);
}

.preview{
width:360px;
height:640px;
border-radius:35px;
overflow:hidden;
position:relative;
background-size:cover;
background-position:center;
box-shadow:0 0 40px rgba(56,189,248,.2);
}

.overlay{
position:absolute;
inset:0;
background:linear-gradient(to top,
rgba(0,0,0,.95),
rgba(0,0,0,.1));
display:flex;
flex-direction:column;
justify-content:end;
align-items:center;
padding:35px;
text-align:center;
}

.surah{
font-size:35px;
font-weight:900;
margin-bottom:18px;
background:rgba(0,0,0,.45);
padding:10px 25px;
border-radius:20px;
}

.reader{
font-size:20px;
margin-bottom:25px;
background:rgba(139,92,246,.35);
padding:10px 20px;
border-radius:18px;
}

.ayah{
font-size:32px;
line-height:2;
font-weight:900;
text-shadow:0 0 10px black;
}

footer{
text-align:center;
padding:40px;
font-size:25px;
font-weight:900;
background:linear-gradient(45deg,#38bdf8,#8b5cf6);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
}

@media(max-width:900px){

.hero h1{
font-size:42px;
}

.panel{
width:100%;
}

.preview{
width:100%;
max-width:360px;
}

}

</style>

</head>

<body>

<nav>

<div class="logo">
HAITHAM STUDIO
</div>

<div>
ورتّل ريلز 🎬
</div>

</nav>

<section class="hero">

أنشئ <span>ريلز قرآني</span> احترافي
</h1>

<p>

<section class="container">

<div class="panel">

</h2>

<label>

<select id="surahSelect"></select>

</label>

<select id="readerSelect">

<option>محمد صديق المنشاوي</option>
<option>محمود خليل الحصري</option>
<option>إدريس أبكر</option>
<option>أبو بكر الشاطري</option>
<option>خالد الجليل</option>
<option>هزاع البلوشي</option>
<option>عبد الرحمن السديس</option>
<option>سعود الشريم</option>
<option>صلاح البدير</option>
<option>بندر بليلة</option>
<option>يحيى حوا</option>
<option>وليد الدليمي</option>
<option>علي جابر</option>
<option>حسين آل الشيخ</option>
<option>أكرم العلاقمي</option>
<option>توفيق الصايغ</option>
<option>محمد اللحيدان</option>

<option>محمد جبريل</option>

<div class="image-grid">

</div>

<button class="btn" onclick="generateAyah()">
إنشاء الريلز 🎬
</button>

</div>

<div class="preview" id="preview"
style="background-image:url('https://images.unsplash.com/photo-1506744038136-46273834b3fb?q=80&w=1200&auto=format&fit=crop')">

<div class="overlay">

<div class="surah" id="surahName">
سورة الفاتحة
</div>

<div class="reader" id="readerName">
القارئ: مشاري العفاسي
</div>

<div class="ayah" id="ayahBox">

</div>

</div>

</div>

</section>

<footer>
Designed By HAITHAM STUDIO
</footer>

<script>

const surahs = [

"الفاتحة","البقرة","آل عمران","النساء","المائدة","الأنعام","الأعراف","الأنفال","التوبة","يونس",
"هود","يوسف","الرعد","إبراهيم","الحجر","النحل","الإسراء","الكهف","مريم","طه",
"الأنبياء","الحج","المؤمنون","النور","الفرقان","الشعراء","النمل","القصص","العنكبوت","الروم",
"لقمان","السجدة","الأحزاب","سبأ","فاطر","يس","الصافات","ص","الزمر","غافر",
"فصلت","الشورى","الزخرف","الدخان","الجاثية","الأحقاف","محمد","الفتح","الحجرات","ق",
"الذاريات","الطور","النجم","القمر","الرحمن","الواقعة","الحديد","المجادلة","الحشر","الممتحنة",
"الصف","الجمعة","المنافقون","التغابن","الطلاق","التحريم","الملك","القلم","الحاقة","المعارج",
"نوح","الجن","المزمل","المدثر","القيامة","الإنسان","المرسلات","النبأ","النازعات","عبس",
"التكوير","الإنفطار","المطففين","الإنشقاق","البروج","الطارق","الأعلى","الغاشية","الفجر","البلد",
"الشمس","الليل","الضحى","الشرح","التين","العلق","القدر","البينة","الزلزلة","العاديات",
"القارعة","التكاثر","العصر","الهمزة","الفيل","قريش","الماعون","الكوثر","الكافرون","النصر",
"المسد","الإخلاص","الفلق","الناس"

];

const surahSelect = document.getElementById("surahSelect");

surahs.forEach(name=>{

let option=document.createElement("option");

option.textContent=name;

surahSelect.appendChild(option);

});

const sampleAyat = {

"الفاتحة":[
"بِسْمِ اللَّهِ الرَّحْمَٰنِ الرَّحِيمِ",
"الْحَمْدُ لِلَّهِ رَبِّ الْعَالَمِينَ",
"الرَّحْمَٰنِ الرَّحِيمِ",
"مَالِكِ يَوْمِ الدِّينِ",
"إِيَّاكَ نَعْبُدُ وَإِيَّاكَ نَسْتَعِينُ"
],

"الإخلاص":[
"قُلْ هُوَ اللَّهُ أَحَدٌ",
"اللَّهُ الصَّمَدُ",
"لَمْ يَلِدْ وَلَمْ يُولَدْ",
"وَلَمْ يَكُن لَّهُ كُفُوًا أَحَدٌ"
]

};

document.querySelectorAll(".image-grid img").forEach(img=>{

img.onclick=()=>{

document.querySelectorAll(".image-grid img")
.forEach(i=>i.classList.remove("active"));

img.classList.add("active");

document.getElementById("preview")
.style.backgroundImage=`url(${img.src})`;

};

});

function generateAyah(){

const surah=surahSelect.value;

const from=parseInt(document.getElementById("fromAyah").value);

const to=parseInt(document.getElementById("toAyah").value);

const reader=document.getElementById("readerSelect").value;

document.getElementById("surahName").innerHTML=
"سورة " + surah;

document.getElementById("readerName").innerHTML=
"القارئ: " + reader;

if(sampleAyat[surah]){

let result="";

for(let i=from-1;i<to;i++){

if(sampleAyat[surah][i]){

result += sampleAyat[surah][i] + " ";

}

}

document.getElementById("ayahBox").innerHTML=result;

}else{

document.getElementById("ayahBox").innerHTML=
"ارفع ملف المصحف الكامل باسم ARQURAN.TXT ليعمل كل القرآن";

}

}

</script>
