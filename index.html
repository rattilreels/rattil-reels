<script>

function setBg(src){

document.getElementById("preview").style.backgroundImage =
"url('" + src + "')";

}

async function createReel(){

let surah =
document.getElementById("surahSelect").value;

let from =
parseInt(document.getElementById("fromAyah").value);

let to =
parseInt(document.getElementById("toAyah").value);

let reader =
document.getElementById("readerSelect").value;

document.getElementById("surahText").innerHTML =
"سورة " + surah;

document.getElementById("readerText").innerHTML =
"القارئ: " + reader;

try{

const response =
await fetch("ARQURAN.TXT");

const text =
await response.text();

const lines =
text.split("\\n");

let found = false;

let ayat = [];

for(let line of lines){

if(line.includes("سورة " + surah)){

found = true;

continue;

}

if(found){

if(line.includes("سورة") && !line.includes(surah)){

break;

}

if(line.trim() !== ""){

ayat.push(line);

}

}

}

let result = "";

for(let i = from - 1; i < to; i++){

if(ayat[i]){

result += ayat[i] + " <br><br> ";

}

}

if(result === ""){

result = "لم يتم العثور على الآيات";

}

document.getElementById("ayahText").innerHTML =
result;

}catch(e){

document.getElementById("ayahText").innerHTML =
"تأكد من رفع ملف ARQURAN.TXT";

}

}
