<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>ورتّل ريلز | HAITHAM STUDIO</title>

<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Cairo',sans-serif;
}

body{
background:#020617;
color:white;
overflow-x:hidden;
min-height:100vh;
}

body::before{
content:'';
position:fixed;
width:100%;
height:100%;
background:
radial-gradient(circle at top,#1e3a8a55,transparent 40%),
radial-gradient(circle at bottom,#7c3aed33,transparent 40%);
animation:bgMove 8s infinite alternate;
z-index:-1;
}

@keyframes bgMove{
0%{transform:scale(1);}
100%{transform:scale(1.1);}
}

nav{
display:flex;
justify-content:space-between;
align-items:center;
padding:22px 40px;
background:rgba(0,0,0,.35);
backdrop-filter:blur(12px);
border-bottom:1px solid rgba(255,255,255,.08);
position:sticky;
top:0;
z-index:999;
}

.logo{
font-size:34px;
font-weight:900;
background:linear-gradient(45deg,#38bdf8,#8b5cf6);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
}

.hero{
text-align:center;
padding:60px 20px;
}

.hero h1{
font-size:65px;
margin-bottom:10px;
}

.hero span{
color:#38bdf8;
}

.hero p{
font-size:22px;
color:#cbd5e1;
}

.container{
display:flex;
justify-content:center;
gap:45px;
padding:20px 30px 60px;
flex-wrap:wrap;
}

.settings{
width:470px;
background:rgba(255,255,255,.05);
padding:30px;
border-radius:30px;
backdrop-filter:blur(20px);
border:1px solid rgba(255,255,255,.08);
box-shadow:0 0 25px rgba(56,189,248,.08);
}

.settings h2{
font-size:34px;
margin-bottom:15px;
}

label{
display:block;
margin-top:18px;
margin-bottom:8px;
font-size:18px;
}

select,input{
width:100%;
padding:16px;
border:none;
border-radius:16px;
background:#0f172a;
color:white;
font-size:17px;
outline:none;
}

.btn{
width:100%;
padding:18px;
margin-top:28px;
border:none;
border-radius:18px;
background:linear-gradient(45deg,#38bdf8,#8b5cf6);
color:white;
font-size:22px;
font-weight:bold;
cursor:pointer;
transition:.4s;
}

.btn:hover{
transform:scale(1.03);
box-shadow:0 0 30px rgba(56,189,248,.5);
}

.preview{
width:360px;
height:640px;
border-radius:35px;
overflow:hidden;
position:relative;
background-size:cover;
background-position:center;
box-shadow:0 0 45px rgba(56,189,248,.25);
animation:float 4s infinite ease-in-out;
transition:.5s;
}

@keyframes float{
0%{transform:translateY(0px);}
50%{transform:translateY(-10px);}
100%{transform:translateY(0px);}
}

.overlay{
position:absolute;
inset:0;
background:linear-gradient(to top,
rgba(0,0,0,.92),
rgba(0,0,0,.15));
display:flex;
flex-direction:column;
justify-content:end;
align-items:center;
padding:35px;
text-align:center;
}

.surah{
background:rgba(0,0,0,.5);
padding:12px 24px;
border-radius:25px;
font-size:28px;
margin-bottom:18px;
backdrop-filter:blur(10px);
}

.reader{
background:rgba(139,92,246,.4);
padding:10px 22px;
border-radius:20px;
font-size:18px;
margin-bottom:22px;
}

.ayah{
font-size:31px;
line-height:2;
font-weight:900;
text-shadow:0 0 15px black;
animation:fadeIn 2s infinite alternate;
}

@keyframes fadeIn{
0%{opacity:.7;}
100%{opacity:1;}
}

footer{
text-align:center;
padding:45px;
}

.designer{
font-size:30px;
font-weight:900;
letter-spacing:5px;
background:linear-gradient(45deg,#38bdf8,#8b5cf6);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
}

.download{
margin-top:18px;
background:#16a34a;
}

.download:hover{
box-shadow:0 0 30px rgba(34,197,94,.4);
}

</style>

</head>

<script>

function updateSurah(value){

document.getElementById("surahText").innerHTML =
"سورة " + value;

}

function updateReader(value){

document.getElementById("readerText").innerHTML =
"القارئ: " + value;

}

function changeBg(value){

document.getElementById("preview").style.backgroundImage =
"url('" + value + "')";

}

function createReel(){

let surah =
document.getElementById("surahSelect").value;

let from =
document.getElementById("fromAyah").value;

let to =
document.getElementById("toAyah").value;

document.getElementById("ayahText").innerHTML =
"سورة " + surah +
"<br><br>" +
"الآيات من " + from +
" إلى " + to;

document.getElementById("preview").style.transform =
"scale(1.03)";

setTimeout(()=>{

document.getElementById("preview").style.transform =
"scale(1)";

},700);

}

function downloadImage(){

html2canvas(document.querySelector("#preview")).then(canvas=>{

let link=document.createElement("a");

link.download="quran-reel.png";

link.href=canvas.toDataURL();

link.click();

});

}

</script>

<script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>
